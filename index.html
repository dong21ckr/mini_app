<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="icon" href="https://telegram.org" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Grid Menu</title>
    <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
    <style>
        body {
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #222);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 25px; }

        /* 2x2 표(그리드) 형식 레이아웃 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2열 */
            gap: 15px; /* 버튼 사이 간격 */
            width: 100%;
            max-width: 400px;
        }

        .menu-btn {
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-button-color, #248bcf);
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 12px;
            padding: 25px 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .menu-btn:active {
            transform: scale(0.95);
            background-color: var(--tg-theme-secondary-bg-color);
        }

        .icon { font-size: 24px; margin-bottom: 8px; }
    </style>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // 사용자 이름 가져오기
        const user = tg.initDataUnsafe?.user;
                
        // 버튼 클릭 핸들러
        async function handleAction(name) {
            
            //tg.showAlert(`${name} 메뉴를 클릭하셨습니다!`);    
            tg.HapticFeedback.impactOccurred('medium'); // 진동 효과
            
            
            // 향후 Vercel API 연동 시 fetch('/api/action', { ... }) 형태로 사용 / Vercel API 호출
            const response = await fetch('/api/bot', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_init_id: tg.initDataUnsafe?.user?.id, // 현재 사용자 ID
                    //text: `<b>[${name}]</b> 메뉴가 클릭되었습니다! 🚀`
                    text: `${name}`
                })
            });

            const result = await response.json();
            if (result.success) {
                tg.showAlert(`${name} 요청이 봇에게 전달되었습니다.`);
            } else {
                tg.showConfirm(`에러 발생: ${result.error}`);
            }
        }
    </script>
</head>
<body>
    <!-- <div class="header">
        <h1 id="welcome-msg">환영합니다!</h1>
    </div> -->

    <!-- 4개 버튼 그리드 -->
    <div class="grid-container">
        <button class="menu-btn" onclick="handleAction('HPN54L_ON')">
            <span class="icon">🖥️</span>
            HPN54L ON
        </button>
        <button class="menu-btn" onclick="handleAction('HPN54L_OFF')">
            <span class="icon">🖥️</span>
            HPN54L OFF
        </button>
        <button class="menu-btn" onclick="handleAction('3970X_ON')">
            <span class="icon">💻</span>
            3970X ON
        </button>
        <button class="menu-btn" onclick="handleAction('3970X_OFF')">
            <span class="icon">💻</span>
            3970X OFF
        </button>
    </div>
    <!-- <script>
        
        if (user) {
            document.getElementById('welcome-msg').innerText = `${user.first_name}님, 환영합니다!`;
        }
    </script> -->
</body>
</html>
